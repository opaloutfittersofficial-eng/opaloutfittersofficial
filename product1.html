<!DOCTYPE html>
<html>
<head>
<title>Chunky Loafer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-page">
  <img src="https://via.placeholder.com/400">

  <h1>Chunky Loafer</h1>
  <p>Premium leather loafer with modern chunky sole. Perfect for luxury casual wear.</p>
  <h2>6000 PKR</h2>

  <form onsubmit="sendOrder(event)">
    <input type="text" placeholder="Name" required><br>
    <input type="text" placeholder="Address" required><br>
    <input type="text" placeholder="Phone" required><br>
    <input type="number" placeholder="Quantity" required><br>

    <button type="submit">Order Now</button>
  </form>
</div>

<script>
function sendOrder(e){
  e.preventDefault();

  let name = e.target[0].value;
  let address = e.target[1].value;
  let phone = e.target[2].value;
  let qty = e.target[3].value;

  window.location.href =
  `mailto:info.guestoutreach@gmail.com?subject=New Order&body=
  Name:${name}
  Address:${address}
  Phone:${phone}
  Product:Chunky Loafer
  Quantity:${qty}`;
}
</script>

</body>
</html>
